<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colour Palette Generator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div id="Container">
        <h1>Colour Palette Generator</h1>

        <button id="generate-btn">
            <i class="fa-solid fa-arrows-rotate"></i>
            Generate Palette
        </button>

        <div id="Palette-container">
            <!-- COLOUR BOX 1 -->
            <div class="colour-box">
                <div class="colour" style="color: #e1f5fe;"></div>
                <div class="colour-info">
                    <span class="hex-value">#e1f5fe</span>
                    <i class="fa-regular fa-copy" title="Copy To Clipboard"></i>
                </div>
            </div>

            <!-- COLOUR BOX 2 -->
             <div class="colour-box">
                <div class="colour" style="color: #b3e5fc;"></div>
                <div class="colour-info">
                    <span class="hex-value">#b3e5fc</span>
                    <i class="fa-regular fa-copy" title="Copy To Clipboard"></i>
                </div>
            </div>

            <!-- COLOUR BOX 3 -->
             <div class="colour-box">
                <div class="colour" style="color: #81d4fa;"></div>
                <div class="colour-info">
                    <span class="hex-value">#81d4fa</span>
                    <i class="fa-regular fa-copy" title="Copy To Clipboard"></i>
                </div>
            </div>

            <!-- COLOUR BOX 4 -->
             <div class="colour-box">
                <div class="colour" style="color: #4fc3f7;"></div>
                <div class="colour-info">
                    <span class="hex-value">#4fc3f7</span>
                    <i class="fa-regular fa-copy" title="Copy To Clipboard"></i>
                </div>
            </div>

            <!-- COLOUR BOX 5 -->  
             <div class="colour-box">
                <div class="colour" style="color: #29b6f6;"></div>
                <div class="colour-info">
                    <span class="hex-value">#29b6f6</span>
                    <i class="fa-regular fa-copy" title="Copy To Clipboard"></i>
                </div>
            </div>

        </div>

    </div>
    <script src="script.js"></script>
</body>
</html>
